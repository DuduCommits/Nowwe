[build]
  # The build happens from the repo root, commands run there
  command = "cd client && bun install && bun run build"
  publish = "client/dist"

# ── SPA routing: all non-file, non-API paths → index.html ─────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = { Path = ["!/api/*", "!/assets/*", "!/*.json", "!/*.ico", "!/*.png", "!/*.svg"] }

# ── API proxy: forward /api/* to the backend server ───────────
[[redirects]]
  from = "/api/*"
  to = "https://balanceboard-api.onrender.com/api/:splat"
  status = 200
  force = true

# ── Headers for security and caching ──────────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
