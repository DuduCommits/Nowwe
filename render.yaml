# ── BalanceBoard Backend Web Service ────────────────────────────
# The frontend is deployed separately via Netlify (see netlify.toml)
# Update FRONTEND_URL after the Netlify site is live.

services:
  - type: web
    name: balanceboard-api
    env: node
    region: ohio
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && node index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: FRONTEND_URL
        value: https://balanceboard.netlify.app
      - key: DATABASE_URL
        sync: false
    domains:
      - balanceboard-api.onrender.com
